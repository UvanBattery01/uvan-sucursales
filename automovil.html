<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automóvil y Camioneta | UVAN BATTERY</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{
    background:linear-gradient(135deg,#000,#7a0000,#d60000);
    color:#fff;
    text-align:center;
    padding:60px 20px 40px;
}

header h1{
    margin:0;
    font-size:34px;
}

header p{
    margin-top:10px;
    opacity:.9;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

.search{
    margin-bottom:25px;
}

.search input{
    width:100%;
    padding:16px;
    border-radius:12px;
    border:none;
    font-size:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.section-title{
    font-size:24px;
    margin:30px 0 20px;
    color:#222;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.image img{
    width:100%;
    height:220px;
    object-fit:contain;
    background:#fff;
}

.info{
    padding:20px;
}

.marca{
    color:#c40000;
    font-weight:bold;
    margin-bottom:5px;
}

.modelo{
    font-size:22px;
    font-weight:bold;
}

.especificaciones{
    margin:15px 0;
    color:#666;
    line-height:1.8;
}

button{
    width:100%;
    padding:14px;
    background:#d60000;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#aa0000;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content{
    background:#fff;
    width:90%;
    max-width:450px;
    border-radius:18px;
    padding:25px;
    text-align:center;
    position:relative;
}

.modal-content img{
    width:100%;
    max-height:250px;
    object-fit:contain;
}

.cerrar{
    position:absolute;
    top:12px;
    right:18px;
    font-size:32px;
    cursor:pointer;
}

#modalInfo{
    text-align:left;
    margin:20px 0;
    line-height:1.8;
}

</style>

</head>

<body>

<header>

<h1>Automóvil y Camioneta</h1>

<p>Encuentra la batería ideal para tu vehículo.</p>

</header>

<div class="container">

<div class="search">
<input type="text" placeholder="🔍 Buscar modelo o marca...">
</div>

<h2 class="section-title">Catálogo</h2>

<div class="grid" id="catalogo"></div>

</div>

<div id="modalProducto" class="modal">
    <div class="modal-content">

        <span class="cerrar" onclick="cerrarProducto()">&times;</span>

        <div class="galeria">

    <button class="flecha" onclick="imagenAnterior()">❮</button>

    <img id="modalImagen" src="" alt="Batería">

    <button class="flecha" onclick="imagenSiguiente()">❯</button>

</div>

<div id="indicadores" class="indicadores"></div>

        <h2 id="modalMarca"></h2>
        <h3 id="modalModelo"></h3>

        <div id="modalInfo"></div>

        <button id="btnWhatsapp">Cotizar por WhatsApp</button>

    </div>
</div>

<script src="productos.js"></script>
<script src="catalogo.js"></script>
<script src="script.js"></script>

</body>
</html>
